name: C Compilation Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gsl-bin libgsl-dev

      - name: Compile all configurations
        working-directory: src
        run: |
          set -e
          CONFINEMENTS=("conf_splitter.c" "conf_sept.c" "conf_cos.c")
          INTERACTIONS=("int_lennardjones.c" "int_hardspheres.c")

          for conf in "${CONFINEMENTS[@]}"; do
            for inter in "${INTERACTIONS[@]}"; do
              echo "=== Compiling with $conf + $inter ==="
              rm -f *.o main_brownconf
              gcc -w -Wall -Wextra -pedantic -c main_brownconf.c
              gcc -w -Wall -Wextra -pedantic \
                main_brownconf.o sim_config.c results_transport.c code_handling.c \
                random_numb_gen.c simulation_core.c print_routines.c array_utils.c \
                equilibration_manager.c $conf $inter -lgsl -lgslcblas -lm -o main_brownconf
            done
          done
